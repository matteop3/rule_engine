# ==============================================================================
# Rule Engine - Docker Compose Configuration
# ==============================================================================
#
# Usage:
#   docker compose up              Start all services (foreground)
#   docker compose up -d           Start all services (background)
#   docker compose up --build      Rebuild images and start
#   docker compose down            Stop and remove containers
#   docker compose down -v         Stop and remove containers + volumes
#   docker compose logs -f         Follow logs
#   docker compose logs -f app     Follow logs for specific service
#
# ==============================================================================

services:

  # ============================================================================
  # PostgreSQL Database
  # ============================================================================
  db:
    image: postgres:16
    container_name: rule_engine_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: rule_engine_db
      POSTGRES_USER: rule_engine_user
      POSTGRES_PASSWORD: rule_engine_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rule_engine_user -d rule_engine_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================================================================
  # FastAPI Application
  # ============================================================================
  app:
    build: .
    container_name: rule_engine_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # Overrides DATABASE_URL from .env to use Docker internal network
      - DATABASE_URL=postgresql://rule_engine_user:rule_engine_password@db:5432/rule_engine_db
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    # Development configuration: bind mount for hot-reload
    volumes:
      - ./app:/app/app:ro
    # Development command with auto-reload (remove for production)
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

# ==============================================================================
# Volumes
# ==============================================================================
volumes:
  postgres_data:
